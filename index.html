<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Formulário Completo</title>
</head>

<body>

    <h1>Formulário Completo</h1>

    <form>

        <fieldset>
            <legend>Dados Pessoais</legend>

            <label>Nome:</label>
            <input type="text"><br><br>

            <label>Sobrenome:</label>
            <input type="text"><br><br>

            <label>Email:</label>
            <input type="email"><br><br>

            <label>Telefone:</label>
            <input type="tel"><br><br>

            <label>Data de Nascimento:</label>
            <input type="date">

        </fieldset>

        <br>

        <fieldset>
            <legend>Endereço</legend>

            <label>Rua:</label>
            <input type="text"><br><br>

            <label>Número:</label>
            <input type="number"><br><br>

            <label>Cidade:</label>
            <input type="text"><br><br>

            <label>Estado:</label>
            <input type="text"><br><br>

            <label>CEP:</label>
            <input type="text">

        </fieldset>

        <br>

        <fieldset>
            <legend>Preferências</legend>

            <label>Cor Favorita:</label>

            <select>
                <option>Vermelho</option>
                <option>Azul</option>
                <option>Verde</option>
                <option>Amarelo</option>
            </select>

            <br><br>

            <label>Gênero:</label>

            <input type="radio" name="genero"> Masculino
            <input type="radio" name="genero"> Feminino

            <br><br>

            <label>Interesses:</label><br>

            <input type="checkbox"> Esportes<br>
            <input type="checkbox"> Música<br>
            <input type="checkbox"> Tecnologia

        </fieldset>

        <br>

        <fieldset>
            <legend>Upload de Arquivos</legend>

            <label>Escolha um arquivo:</label>
            <input type="file">

        </fieldset>

        <br>

        <fieldset>
            <legend>Informações de Login</legend>

            <label>Nome de Usuário:</label>
            <input type="text"><br><br>

            <label>Senha:</label>
            <input type="password"><br><br>

            <label>Confirmar Senha:</label>
            <input type="password">

        </fieldset>

        <br>

        <input type="submit" value="Enviar">

    </form>

</body>
</html>
